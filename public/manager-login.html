<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Factory Scan Clock - Manager Login</title>
    <meta name="theme-color" content="#0f2a44" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Factory Scan" />
    <link rel="manifest" href="/manifest-manager.json" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(160deg, #f8fbff 0%, #eaf2ff 100%);
        color: #0f172a;
        position: relative;
        overflow: hidden auto;
      }
      .bg-shapes {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .shape-top {
        position: absolute;
        width: min(62vw, 920px);
        height: min(44vw, 560px);
        top: -190px;
        left: -220px;
        border-radius: 0 0 70% 20%;
        background: linear-gradient(135deg, #0f2a44 6%, #0b3a66 58%, #1e90ff 100%);
        opacity: 0.9;
        transform: rotate(-8deg);
      }
      .shape-top::after {
        content: "";
        position: absolute;
        width: 66%;
        height: 74%;
        right: -14%;
        top: -32%;
        border-radius: 0 0 70% 24%;
        background: rgba(255, 255, 255, 0.85);
        transform: rotate(9deg);
      }
      .shape-bottom {
        position: absolute;
        width: min(86vw, 1200px);
        height: min(33vw, 380px);
        bottom: -210px;
        left: -160px;
        border-radius: 48% 52% 0 0;
        background: linear-gradient(130deg, #0f2a44 5%, #0c3561 62%, #1e90ff 100%);
        opacity: 0.95;
      }
      .tank-ghost {
        position: absolute;
        top: 26px;
        right: 3%;
        width: min(48vw, 620px);
        height: min(58vh, 640px);
        opacity: 0.18;
        filter: blur(0.6px);
        background:
          radial-gradient(circle at 67% 30%, rgba(15, 42, 68, 0.2), rgba(15, 42, 68, 0.02) 56%, transparent 68%),
          linear-gradient(180deg, rgba(15, 42, 68, 0.2), rgba(15, 42, 68, 0.04));
        border-radius: 42% 42% 50% 50%;
      }
      .tank-ghost::before,
      .tank-ghost::after {
        content: "";
        position: absolute;
        border: 2px solid rgba(15, 42, 68, 0.22);
        border-radius: 50%;
      }
      .tank-ghost::before {
        width: 76%;
        height: 76%;
        top: 10%;
        left: 12%;
      }
      .tank-ghost::after {
        width: 50%;
        height: 50%;
        top: 24%;
        left: 25%;
      }
      .tank-rails {
        position: absolute;
        width: 70%;
        height: 2px;
        left: 16%;
        top: 10%;
        background: rgba(15, 42, 68, 0.16);
        box-shadow:
          0 16px 0 rgba(15, 42, 68, 0.09),
          0 220px 0 rgba(15, 42, 68, 0.09);
      }
      .page {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 26px 14px 110px;
        position: relative;
        z-index: 1;
      }
      .card {
        width: min(520px, calc(100% - 12px));
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(15, 42, 68, 0.08);
        border-radius: 28px;
        box-shadow: 0 30px 80px rgba(15, 42, 68, 0.18);
        padding: 38px 38px 32px;
      }
      .brand {
        text-align: center;
        margin-bottom: 20px;
      }
      .brand img {
        width: 104px;
        height: 104px;
        border-radius: 22px;
        box-shadow: 0 14px 34px rgba(15, 42, 68, 0.22);
      }
      h1 {
        margin: 12px 0 0;
        font-size: clamp(2rem, 3vw, 2.75rem);
        letter-spacing: -0.02em;
        color: #0f172a;
        font-weight: 800;
      }
      p.lead {
        margin: 8px 0 10px;
        color: #4f46e5;
        font-weight: 600;
        font-size: 1.1rem;
      }
      .divider {
        position: relative;
        margin: 8px auto 18px;
        width: min(340px, 100%);
        height: 1px;
        background: #d9e2f0;
      }
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 9px;
        height: 9px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: #7c3aed;
      }
      label {
        display: block;
        margin: 13px 0 8px;
        font-weight: 600;
        color: #1e293b;
        font-size: 1.1rem;
      }
      .input-wrap {
        position: relative;
      }
      .field-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        width: 19px;
        height: 19px;
        transform: translateY(-50%);
        stroke: #8fa1b8;
        pointer-events: none;
      }
      input {
        width: 100%;
        height: 56px;
        border: 1px solid #dbe3ef;
        border-radius: 14px;
        padding: 0 16px 0 48px;
        font-size: 1.08rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      input:focus {
        border-color: #7c3aed;
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.18);
      }
      .pw-toggle {
        margin-top: 8px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 1rem;
        color: #334155;
        user-select: none;
      }
      .pw-toggle input {
        width: 16px;
        height: 16px;
        margin: 0;
        padding: 0;
      }
      button.submit {
        width: 100%;
        margin-top: 16px;
        height: 56px;
        border: 0;
        border-radius: 14px;
        padding: 0 18px;
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.01em;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        cursor: pointer;
        transition: filter 0.2s ease, transform 0.08s ease;
      }
      button.submit::before { content: "\21AA  "; font-size: 1.05rem; }
      button.submit:hover { filter: brightness(1.05); }
      button.submit:active { transform: translateY(1px); }
      .security {
        text-align: center;
        margin-top: 12px;
        font-size: 0.98rem;
        color: #64748b;
      }
      .hint { margin-top: 10px; min-height: 18px; color: #b91c1c; font-size: 0.95rem; }
      .install-links {
        margin-top: 16px;
        text-align: center;
        font-size: 0.98rem;
      }
      .install-links a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 600;
      }
      .install-links a::before { content: "\1F4D6  "; }
      .trust-row {
        width: min(860px, calc(100vw - 22px));
        position: absolute;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 14px 34px rgba(5, 23, 48, 0.3);
      }
      .trust-item {
        text-align: left;
        padding: 16px 14px;
        background: linear-gradient(120deg, #0b2d53 0%, #0f3f73 100%);
        color: #fff;
        border-right: 1px solid rgba(255, 255, 255, 0.16);
      }
      .trust-item:last-child { border-right: 0; }
      .trust-item strong {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #fff;
        font-size: 1rem;
      }
      .trust-item strong::before {
        content: "";
        width: 28px;
        height: 28px;
        border-radius: 9px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
      }
      .trust-item span {
        display: block;
        margin-top: 4px;
        font-size: 0.94rem;
        color: rgba(235, 245, 255, 0.95);
      }
      @media (max-width: 720px) {
        body { overflow-y: auto; }
        .card {
          width: calc(100% - 10px);
          padding: 26px;
          border-radius: 24px;
        }
        .brand img {
          width: 76px;
          height: 76px;
          border-radius: 16px;
        }
        label { font-size: 1rem; }
        button.submit { font-size: 1.05rem; }
        .trust-row {
          width: calc(100% - 16px);
          bottom: 8px;
        }
        .trust-item {
          padding: 11px 8px;
          text-align: center;
        }
        .trust-item span { display: none; }
        .trust-item strong {
          font-size: 0.9rem;
          justify-content: center;
        }
        .trust-item strong::before {
          width: 22px;
          height: 22px;
        }
      }
      @media (max-width: 520px) {
        .shape-top,
        .shape-bottom { opacity: 0.68; }
        .tank-ghost {
          right: -26%;
          top: 72px;
          width: 84vw;
          opacity: 0.14;
        }
        .page { padding-bottom: 92px; }
      }
    </style>
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true">
      <div class="shape-top"></div>
      <div class="shape-bottom"></div>
      <div class="tank-ghost"></div>
      <div class="tank-rails"></div>
    </div>
    <main class="page">
      <div class="card">
        <div class="brand">
          <img src="/icons/icon-192.png" alt="Factory Scan Clock icon" />
          <h1>Factory Scan Clock</h1>
          <p class="lead">Manager Login</p>
          <div class="divider"></div>
        </div>
        <form id="panelManager" autocomplete="off">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none">
              <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 1 0-14 0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <input id="username" name="username" type="text" placeholder="Username" required />
          </div>
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none">
              <path d="M7 10V8a5 5 0 0 1 10 0v2m-9 0h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <input id="password" name="password" type="password" placeholder="Password" required />
          </div>
          <label class="pw-toggle" for="showPassword">
            <input id="showPassword" type="checkbox" />
            Show password
          </label>
          <button type="submit" class="submit">Login</button>
          <div class="security">Secure &amp; Confidential</div>
          <div class="hint" id="hintManager" role="status" aria-live="polite"></div>
        </form>
        <div class="install-links">
          <a href="/install">Install shortcuts guide</a>
        </div>
        <div class="trust-row" aria-label="trust highlights">
          <div class="trust-item"><strong>Secure</strong><span>Your data is protected</span></div>
          <div class="trust-item"><strong>Accurate</strong><span>Real-time tracking</span></div>
          <div class="trust-item"><strong>Reliable</strong><span>Built for operations</span></div>
          <div class="trust-item"><strong>Support</strong><span>We are here to help</span></div>
        </div>
      </div>
    </main>
    <script>
      const panelManager = document.getElementById('panelManager');
      const hintManager = document.getElementById('hintManager');
      const showPassword = document.getElementById('showPassword');
      const passwordInput = document.getElementById('password');
      showPassword.addEventListener('change', () => {
        passwordInput.type = showPassword.checked ? 'text' : 'password';
      });
      panelManager.addEventListener('submit', async (e) => {
        e.preventDefault();
        hintManager.textContent = '';
        const username = document.getElementById('username').value.trim();
        const password = passwordInput.value;
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          hintManager.textContent = (data && data.message) || 'Login failed. Please check username and password.';
          return;
        }
        window.location.href = data.redirect || '/manager-dashboard';
      });
    </script>
    <script src="/pwa.js"></script>
  </body>
</html>
