<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Factory Scan Clock</title>
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Factory Scan" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #eef2ff 0%, #e2e8f0 100%);
        display: grid;
        place-items: center;
        color: #0f172a;
      }
      .card {
        width: min(420px, 92vw);
        background: #fff;
        border: 1px solid #dbeafe;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(30, 41, 59, 0.15);
        padding: 24px;
      }
      h1 { margin: 0; font-size: 28px; }
      p.lead { margin: 6px 0 18px; color: #475569; }
      .actions {
        display: grid;
        gap: 10px;
      }
      .link-btn {
        display: block;
        width: 100%;
        text-align: center;
        text-decoration: none;
        border-radius: 10px;
        padding: 11px 12px;
        font-weight: 700;
      }
      .link-btn.manager {
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
      }
      .link-btn.kiosk {
        color: #4338ca;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
      }
      .install-links { margin-top: 14px; text-align: center; font-size: 13px; }
      .install-links a { color: #4338ca; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Factory Scan Clock</h1>
      <p class="lead">Choose your access mode.</p>
      <div class="actions">
        <a class="link-btn manager" href="/manager-login">Manager Login</a>
        <a class="link-btn kiosk" href="/kiosk-login">Kiosk PIN Login</a>
      </div>
      <div class="install-links">
        <a href="/install">Install shortcuts guide</a>
      </div>
    </div>
    <script src="/pwa.js"></script>
  </body>
</html>
