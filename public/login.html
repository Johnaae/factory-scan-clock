<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Factory Scan Clock Login</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #eef2ff 0%, #e2e8f0 100%);
        display: grid;
        place-items: center;
        color: #0f172a;
      }
      .card {
        width: min(420px, 92vw);
        background: #fff;
        border: 1px solid #dbeafe;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(30, 41, 59, 0.15);
        padding: 24px;
      }
      h1 { margin: 0; font-size: 28px; }
      p.lead { margin: 6px 0 18px; color: #475569; }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
      }
      .tabs button {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        color: #475569;
      }
      .tabs button.active {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        border-color: transparent;
      }
      .panel { display: none; }
      .panel.active { display: block; }
      label { display: block; margin: 10px 0 6px; font-weight: 600; }
      input, select {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 15px;
      }
      .password-row {
        position: relative;
      }
      .pw-toggle {
        margin-top: 8px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #334155;
        user-select: none;
      }
      .pw-toggle input {
        width: auto;
        margin: 0;
      }
      button.submit {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 10px;
        padding: 11px 12px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        cursor: pointer;
      }
      .hint { margin-top: 10px; min-height: 18px; color: #b91c1c; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Factory Scan Clock</h1>
      <p class="lead">Sign in as manager or kiosk station.</p>

      <div class="tabs" role="tablist">
        <button type="button" id="tabManager" class="active" role="tab" aria-selected="true">Manager Login</button>
        <button type="button" id="tabKiosk" role="tab" aria-selected="false">Kiosk PIN Login</button>
      </div>

      <form class="panel active" id="panelManager" autocomplete="off">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />
        <label for="password">Password</label>
        <div class="password-row">
          <input id="password" name="password" type="password" required />
        </div>
        <label class="pw-toggle" for="showPassword">
          <input id="showPassword" type="checkbox" />
          Show password
        </label>
        <button type="submit" class="submit">Login</button>
        <div class="hint" id="hintManager" role="status" aria-live="polite"></div>
      </form>

      <form class="panel" id="panelKiosk" autocomplete="off">
        <label for="kioskArea">Area</label>
        <select id="kioskArea" name="area" required>
          <option value="">Select area…</option>
          <option value="Area A">Area A</option>
          <option value="Area B">Area B</option>
          <option value="Area C">Area C</option>
        </select>
        <label for="kioskPin">PIN (4–6 digits)</label>
        <input id="kioskPin" name="pin" type="password" inputmode="numeric" pattern="[0-9]{4,6}" minlength="4" maxlength="6" autocomplete="one-time-code" required />
        <label class="pw-toggle" for="showKioskPin">
          <input id="showKioskPin" type="checkbox" />
          Show PIN
        </label>
        <button type="submit" class="submit">Login</button>
        <div class="hint" id="hintKiosk" role="status" aria-live="polite"></div>
      </form>
    </div>
    <script>
      const tabManager = document.getElementById('tabManager');
      const tabKiosk = document.getElementById('tabKiosk');
      const panelManager = document.getElementById('panelManager');
      const panelKiosk = document.getElementById('panelKiosk');
      const hintManager = document.getElementById('hintManager');
      const hintKiosk = document.getElementById('hintKiosk');

      function showTab(which) {
        const isMgr = which === 'manager';
        tabManager.classList.toggle('active', isMgr);
        tabKiosk.classList.toggle('active', !isMgr);
        tabManager.setAttribute('aria-selected', isMgr ? 'true' : 'false');
        tabKiosk.setAttribute('aria-selected', !isMgr ? 'true' : 'false');
        panelManager.classList.toggle('active', isMgr);
        panelKiosk.classList.toggle('active', !isMgr);
      }
      tabManager.addEventListener('click', () => showTab('manager'));
      tabKiosk.addEventListener('click', () => showTab('kiosk'));

      const showPassword = document.getElementById('showPassword');
      const passwordInput = document.getElementById('password');
      showPassword.addEventListener('change', () => {
        passwordInput.type = showPassword.checked ? 'text' : 'password';
      });

      const showKioskPin = document.getElementById('showKioskPin');
      const kioskPinInput = document.getElementById('kioskPin');
      showKioskPin.addEventListener('change', () => {
        kioskPinInput.type = showKioskPin.checked ? 'text' : 'password';
      });

      panelManager.addEventListener('submit', async (e) => {
        e.preventDefault();
        hintManager.textContent = '';
        const username = document.getElementById('username').value.trim();
        const password = passwordInput.value;
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          hintManager.textContent =
            (data && data.message) || 'Login failed. Please check username and password.';
          return;
        }
        window.location.href = data.redirect || '/scan';
      });

      panelKiosk.addEventListener('submit', async (e) => {
        e.preventDefault();
        hintKiosk.textContent = '';
        const area = document.getElementById('kioskArea').value.trim();
        const pin = kioskPinInput.value.trim();
        const res = await fetch('/api/auth/login-kiosk-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ area, pin }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          hintKiosk.textContent =
            (data && data.message) || 'Login failed. Check area and PIN.';
          return;
        }
        window.location.href = data.redirect || '/scan';
      });
    </script>
  </body>
</html>
